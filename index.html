<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>PAINT LIKE POLLOCK</title>
  
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Gochi+Hand&display=swap" rel="stylesheet">

  <script src="https://cdnjs.cloudflare.com/ajax/libs/p5.js/1.9.0/p5.min.js"></script>
  <script src="https://unpkg.com/ml5@1/dist/ml5.min.js"></script>
  
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <div id="app-container">
    
    <div id="status-indicator">HOVERING</div>

    <div id="intro-overlay">
      <span class="desktop-only">PRESS [SPACE]</span><span class="mobile-only">TAP CANVAS</span> + OPEN YOUR MOUTH TO DRAW
    </div>

    <div id="side-toolbar">
      <button id="btn-undo" class="circle-btn"><img src="imgs/undo.svg" alt="Undo" class="btn-icon"></button>
      <button id="btn-reset" class="circle-btn danger-btn"><img src="imgs/trash.svg" alt="Clear" class="btn-icon"></button>
      <button id="btn-toggle-cam" class="circle-btn"><img src="imgs/video.svg" alt="Camera" class="btn-icon"></button>
      <button id="btn-eraser" class="circle-btn"><img src="imgs/eraser.svg" alt="Erase" class="btn-icon"></button>
      
      <div class="accordion-group">
        <button id="btn-shapes-toggle" class="circle-btn"><img src="imgs/shapes.svg" alt="Shapes" class="btn-icon"></button>
        <div id="shapes-panel" class="panel hidden">
          <button class="circle-btn shape-btn active" data-shape="circle"><img src="imgs/circle.svg" alt="Circle" class="btn-icon"></button>
          <button class="circle-btn shape-btn" data-shape="square"><img src="imgs/square.svg" alt="Square" class="btn-icon"></button>
          <button class="circle-btn shape-btn" data-shape="triangle"><img src="imgs/triangle.svg" alt="Triangle" class="btn-icon"></button>
          <button class="circle-btn shape-btn" data-shape="star"><img src="imgs/star.svg" alt="Star" class="btn-icon"></button>
        </div>
      </div>

      <div class="accordion-group">
        <button id="btn-colors-toggle" class="circle-btn"><img src="imgs/color.svg" alt="Colors" class="btn-icon"></button>
        <div id="colors-panel" class="panel hidden">
          <button id="btn-custom-color" class="circle-btn"><img src="imgs/colorwheel.svg" alt="Custom Color" class="btn-icon"></button>
          <input type="color" id="color-picker" style="display: none;" value="#00FF00">
          
          <button class="circle-btn color-btn" style="background-color: #FF2B79;" data-color="#FF0000"></button>
          <button class="circle-btn color-btn" style="background-color: #FFE100;" data-color="#FFA500"></button>
          <button class="circle-btn color-btn" style="background-color: #00FF04;" data-color="#00FF00"></button>
          <button class="circle-btn color-btn" style="background-color: #00EEFF;" data-color="#0000FF"></button>
          <button class="circle-btn color-btn" style="background-color: #A02DFF;" data-color="#a200ff"></button>
          <button class="circle-btn color-btn" style="background-color: #FFFFFF;" data-color="#FFFFFF"></button>
        </div>
      </div>

      <button id="btn-selfie" class="circle-btn"><img src="imgs/camera.svg" alt="Selfie" class="btn-icon"></button>
      <button id="btn-download" class="circle-btn export-btn"><img src="imgs/download.svg" alt="Save" class="btn-icon"></button>
    </div>

    <div id="face-widget">
      <button id="face-widget-toggle" class="circle-btn face-toggle-btn">
        <img src="imgs/potatoface.svg" alt="Face Options" id="face-diagram" style="width: 25px; height: 25px; margin: 0;"> 
      </button>
    </div>

    <div id="face-widget-window" class="hidden">
      <img src="imgs/tab.svg" class="custom-window-bg" alt="Window Background">

      <div class="fake-window-header" id="face-widget-window-header">
        <button id="face-widget-close" class="close-btn">
          <img src="imgs/close.svg" alt="Close" style="width: 15px; height: 15px;">
        </button>
      </div>
      
      <div class="popup-body">
        <div class="face-diagram-container">
          <div class="face-outline">
            <div class="face-point left-eye" data-point="leftEye"><div class="red-dot"></div></div>
            <div class="face-point right-eye" data-point="rightEye"><div class="red-dot"></div></div>
            <div class="face-point nose active" data-point="nose"><div class="red-dot"></div></div>
            <div class="face-point mouth" data-point="mouth"><div class="red-dot"></div></div>
          </div>
        </div>
      </div>
    </div>

    <div id="canvas-container">
      <div id="video-wrapper"></div>
    </div>
  </div>

  <script src="sketch.js"></script>

</body>
</html>
